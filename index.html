<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Departure Studio — Client Portal</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="stylesheet" href="/shared/styles.css" />
</head>
<body>

  <div id="gate" class="gate">
    <div class="gate-inner">
      <div id="gate-logo"></div>
      <div class="gate-label">Client Portal</div>
      <input type="password" id="gate-input" placeholder="Enter password" autocomplete="off" />
      <div class="gate-error" id="gate-error"></div>
      <div class="gate-hint">Contact your project lead for access</div>
    </div>
  </div>

  <script src="/shared/engine.js"></script>
  <script>

  // ══════════════════════════════════════════════════════
  // CLIENT ROUTING TABLE
  // Add new clients here: { hash: "sha256hash", path: "/clientfolder/" }
  //
  // To generate a hash for a new password, run in browser console:
  // crypto.subtle.digest('SHA-256', new TextEncoder().encode('password')).then(h => console.log(Array.from(new Uint8Array(h)).map(b => b.toString(16).padStart(2,'0')).join('')))
  // ══════════════════════════════════════════════════════

  const CLIENTS = [
    {
      hash: "3867da6e50ffd505c7272e6f450c988f7e227a2b22fa8a156040e51cb709ab3a", // "deptxsunstrong26"
      path: "/sunstrong/",
    },
    // {
    //   hash: "abc123...",  // "nextclient"
    //   path: "/next-client/",
    // },
  ];

  // ── Router Logic ──

  document.getElementById("gate-logo").innerHTML = logo(48);

  const input = document.getElementById("gate-input");
  const error = document.getElementById("gate-error");

  input.addEventListener("keydown", async (e) => {
    if (e.key === "Enter") {
      const hash = await hashPassword(input.value);
      const match = CLIENTS.find(c => c.hash === hash);

      if (match) {
        window.location.href = match.path;
      } else {
        error.textContent = "Incorrect password";
        input.value = "";
        input.focus();
      }
    }
  });

  </script>
</body>
</html>
