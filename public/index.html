<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Departure — Client Dashboard</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter+Tight:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    ::selection { background: #171717; color: #fafaf9; }

    body {
      font-family: 'Inter Tight', sans-serif;
      background: #fafaf9;
      color: #171717;
      line-height: 1.45;
      -webkit-font-smoothing: antialiased;
    }

    .gate {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
    }
    .gate-inner { width: 100%; max-width: 320px; text-align: center; }
    .gate-inner svg { margin-bottom: 32px; }
    .gate-label {
      font-size: 11px; font-weight: 500; letter-spacing: 0.08em;
      text-transform: uppercase; color: #a3a3a3; margin-bottom: 16px;
    }
    .gate input[type="password"] {
      width: 100%; padding: 12px 16px; font-family: 'Inter Tight', sans-serif;
      font-size: 14px; border: 1px solid #e5e5e5; background: #fff;
      color: #171717; outline: none; transition: border-color 0.15s ease;
      letter-spacing: 0.12em;
    }
    .gate input:focus { border-color: #171717; }
    .gate input::placeholder { color: #d4d4d4; letter-spacing: 0.04em; }
    .gate-error { font-size: 12px; color: #ef4444; margin-top: 10px; height: 18px; }
    .gate-hint { font-size: 11px; color: #d4d4d4; margin-top: 24px; }
  </style>
</head>
<body>

  <div class="gate">
    <div class="gate-inner">

      <div class="gate-label">Client Dashboard</div>
      <input type="password" id="gate-input" placeholder="Enter password" autocomplete="off" />
      <div class="gate-error" id="gate-error"></div>
      <div class="gate-hint">Contact your project lead for access</div>
    </div>
  </div>

  <script>
  var CLIENTS = [
    {
      hash: "3867da6e50ffd505c7272e6f450c988f7e227a2b22fa8a156040e51cb709ab3a",
      path: "sunstrong/"
    }
  ];

  async function hashPassword(pw) {
    var buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(pw));
    return Array.from(new Uint8Array(buf)).map(function(b) { return b.toString(16).padStart(2, "0"); }).join("");
  }

  var input = document.getElementById("gate-input");
  var error = document.getElementById("gate-error");

  input.addEventListener("keydown", async function(e) {
    if (e.key === "Enter") {
      var h = await hashPassword(input.value);
      for (var i = 0; i < CLIENTS.length; i++) {
        if (h === CLIENTS[i].hash) {
          window.location.href = CLIENTS[i].path;
          return;
        }
      }
      error.textContent = "Incorrect password";
      input.value = "";
      input.focus();
    }
  });
  </script>

</body>
</html>
