<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SunStrong Management — Project Dashboard</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter+Tight:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    ::selection { background: #171717; color: #fafaf9; }

    body {
      font-family: 'Inter Tight', sans-serif;
      background: #fafaf9;
      color: #171717;
      line-height: 1.45;
      -webkit-font-smoothing: antialiased;
    }

    .gate {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
    }
    .gate-inner { width: 100%; max-width: 320px; text-align: center; }
    .gate-inner svg { margin-bottom: 32px; }
    .gate-label {
      font-size: 11px; font-weight: 500; letter-spacing: 0.08em;
      text-transform: uppercase; color: #a3a3a3; margin-bottom: 16px;
    }
    .gate input[type="password"] {
      width: 100%; padding: 12px 16px; font-family: 'Inter Tight', sans-serif;
      font-size: 14px; border: 1px solid #e5e5e5; background: #fff;
      color: #171717; outline: none; transition: border-color 0.15s ease;
      letter-spacing: 0.12em;
    }
    .gate input[type="password"]:focus { border-color: #171717; }
    .gate input[type="password"]::placeholder { color: #d4d4d4; letter-spacing: 0.04em; }
    .gate-error { font-size: 12px; color: #ef4444; margin-top: 10px; height: 18px; }
    .gate-hint { font-size: 11px; color: #d4d4d4; margin-top: 24px; }

    .dashboard { display: none; }
    .dashboard.visible { display: block; }

    .micro-label {
      font-size: 11px; font-weight: 500; letter-spacing: 0.08em;
      text-transform: uppercase; color: #a3a3a3;
    }
    .section-title {
      font-size: 11px; font-weight: 500; letter-spacing: 0.08em;
      text-transform: uppercase; color: #737373; margin-bottom: 14px;
    }

    .dash-header { padding: 32px 40px 28px; border-bottom: 1px solid #e5e5e5; }
    .header-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px; }
    .dash-header h1 { font-size: 28px; font-weight: 600; letter-spacing: -0.02em; line-height: 1.15; }
    .header-meta { font-size: 13px; color: #737373; margin-top: 6px; }

    .content { padding: 32px 40px 48px; max-width: 960px; }
    .section { margin-bottom: 48px; }

    .progress-track { height: 3px; background: #e5e5e5; border-radius: 2px; overflow: hidden; }
    .progress-fill { height: 100%; background: #171717; border-radius: 2px; transition: width 0.6s ease; }

    .phases-grid {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 1px; background: #e5e5e5; border: 1px solid #e5e5e5;
    }
    .phase-card { background: #fff; padding: 20px 22px; }
    .phase-card.active { background: #171717; color: #fafaf9; }
    .phase-meta {
      font-size: 10px; font-weight: 500; letter-spacing: 0.1em;
      text-transform: uppercase; color: #a3a3a3; margin-bottom: 6px;
    }
    .phase-name { font-size: 15px; font-weight: 600; letter-spacing: -0.01em; margin-bottom: 6px; }
    .phase-desc { font-size: 12px; color: #737373; line-height: 1.5; }
    .phase-card.active .phase-desc { color: #a3a3a3; }
    .active-dot {
      display: inline-block; width: 6px; height: 6px; border-radius: 50%;
      background: #22c55e; margin-left: 8px; vertical-align: middle;
    }

    .dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; margin-top: 2px; }
    .dot-done { background: #22c55e; }
    .dot-active, .dot-inprogress { background: #111; }
    .dot-upcoming, .dot-notstarted { background: #d4d4d4; }
    .dot-recurring { background: #a3a3a3; }

    .milestone-row { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 1px solid #f0f0f0; }
    .milestone-row:last-child { border-bottom: none; }
    .milestone-label { font-size: 13px; flex: 1; }
    .milestone-label.done { color: #a3a3a3; text-decoration: line-through; }
    .milestone-label.active { font-weight: 600; }
    .milestone-date { font-size: 12px; color: #a3a3a3; font-variant-numeric: tabular-nums; min-width: 60px; text-align: right; }

    .tabs { display: flex; gap: 0; }
    .tab-btn {
      background: none; border: none; border-bottom: 1.5px solid transparent;
      padding: 4px 12px 6px; font-size: 12px; font-weight: 400; color: #a3a3a3;
      cursor: pointer; font-family: 'Inter Tight', sans-serif;
      letter-spacing: 0.01em; transition: all 0.15s ease;
    }
    .tab-btn.active { border-bottom-color: #171717; font-weight: 600; color: #171717; }

    .phase-group-label {
      font-size: 10px; font-weight: 500; letter-spacing: 0.1em;
      text-transform: uppercase; color: #a3a3a3; margin-bottom: 8px;
      padding-bottom: 6px; border-bottom: 1px solid #f0f0f0;
    }
    .task-row { display: flex; align-items: center; gap: 10px; padding: 7px 0; }
    .task-name { font-size: 13px; flex: 1; }
    .task-name.active { font-weight: 500; }
    .task-due { font-size: 11px; color: #a3a3a3; font-variant-numeric: tabular-nums; min-width: 56px; text-align: right; }
    .task-priority { font-size: 11px; margin-right: 12px; }
    .task-priority.high { color: #171717; font-weight: 500; }
    .task-priority.medium { color: #a3a3a3; }

    .needs-table { background: #fff; border: 1px solid #e5e5e5; }
    .needs-header, .needs-row { display: grid; grid-template-columns: 1fr 100px 100px; padding: 10px 18px; }
    .needs-header {
      border-bottom: 1px solid #e5e5e5; font-size: 10px; font-weight: 500;
      letter-spacing: 0.08em; text-transform: uppercase; color: #a3a3a3;
    }
    .needs-row { font-size: 13px; border-bottom: 1px solid #f5f5f5; }
    .needs-row:last-child { border-bottom: none; }
    .needs-row .when { font-size: 12px; color: #737373; }
    .needs-row .when.urgent { color: #171717; font-weight: 600; }
    .needs-row .owner { font-size: 12px; color: #737373; }

    .dash-footer {
      border-top: 1px solid #e5e5e5; padding-top: 20px;
      display: flex; justify-content: space-between; align-items: center;
      font-size: 11px; color: #a3a3a3;
    }

    @media (max-width: 680px) {
      .dash-header { padding: 24px 20px 20px; }
      .dash-header h1 { font-size: 22px; }
      .content { padding: 24px 20px 40px; }
      .phases-grid { grid-template-columns: 1fr; }
      .needs-header, .needs-row { grid-template-columns: 1fr 80px 80px; padding: 10px 12px; }
    }
  </style>
</head>

          { name: "Build — inner pages and CMS templates", due: "May 15", status: "Not Started" },
          { name: "QA, responsive testing, and polish", due: "May 18", status: "Not Started" },
          { name: "Launch 1 — live site", due: "May 22", status: "Not Started" },
        ]},
        { label: "Iteration & Extension · Wks 9–12", tasks: [
          { name: "Collect live site feedback", due: "May 29", status: "Not Started" },
          { name: "Website refinements and iteration", due: "Jun 12", status: "Not Started" },
          { name: "Launch 2 — iteration complete", due: "Jun 15", status: "Not Started" },
        ]},
      ],
    },
    retainer: {
      label: "Retainer",
      tasks: [
        { name: "Kickoff and onboarding", due: "Mar 18", priority: "High", status: "In Progress" },
        { name: "Collect all existing brand assets and agency work", due: "Mar 20", priority: "High", status: "In Progress" },
        { name: "Establish coordination with identity agency", due: "Mar 20", priority: "High", status: "In Progress" },
        { name: "Weekly sync with SunStrong team", due: "Ongoing", priority: "Medium", status: "Recurring" },
        { name: "Identify Month 3 extension priorities", due: "May 1", priority: "Medium", status: "Not Started" },
      ],
    },
  };

  const NEEDS = [
    { item: "Existing brand assets and agency files", urgency: "Now", owner: "SunStrong" },
    { item: "Identity agency intro / coordination call", urgency: "This week", owner: "SunStrong" },
    { item: "Hosting credentials and current analytics", urgency: "This week", owner: "SunStrong" },
    { item: "Copy, photography, team bios, testimonials", urgency: "By Apr 3", owner: "SunStrong" },
    { item: "Stakeholder input on site goals and audiences", urgency: "By Mar 27", owner: "SunStrong" },
  ];

  // ══════════════════════════════════════════
  // ENGINE — no need to edit below
  // ══════════════════════════════════════════

  async function hashPassword(pw) {
    const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(pw));
    return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, "0")).join("");
  }

  function dotClass(s) {
    return { done:"dot-done", active:"dot-active", upcoming:"dot-upcoming",
      "In Progress":"dot-inprogress", "Not Started":"dot-notstarted", Recurring:"dot-recurring" }[s] || "dot-upcoming";
  }

  // Auth
  const gateInput = document.getElementById("gate-input");
  const gateError = document.getElementById("gate-error");

  if (sessionStorage.getItem("dash_sunstrong") === "1") {
    document.getElementById("gate").style.display = "none";
    document.getElementById("dashboard").classList.add("visible");
  }

  gateInput.addEventListener("keydown", async (e) => {
    if (e.key === "Enter") {
      const hash = await hashPassword(gateInput.value);
      if (hash === PASSWORD_HASH) {
        sessionStorage.setItem("dash_sunstrong", "1");
        document.getElementById("gate").style.display = "none";
        document.getElementById("dashboard").classList.add("visible");
      } else {
        gateError.textContent = "Incorrect password";
        gateInput.value = "";
        gateInput.focus();
      }
    }
  });

  // Render
  function render() {
    const start = new Date(ENGAGEMENT.startDate);
    const end = new Date(ENGAGEMENT.endDate);
    const now = new Date();
    const week = Math.max(1, Math.min(Math.ceil(((now - start) / 864e5 + 1) / 7), ENGAGEMENT.totalWeeks));
    const progress = Math.min(Math.max(((now - start) / (end - start)) * 100, 0), 100);

    document.getElementById("week-label").textContent = "Week " + week + " of " + ENGAGEMENT.totalWeeks;
    document.getElementById("updated-label").textContent = "Updated " + ENGAGEMENT.lastUpdated;
    document.getElementById("client-name").textContent = ENGAGEMENT.client;
    document.getElementById("engagement-meta").textContent = ENGAGEMENT.type + " · " + ENGAGEMENT.lead;
    document.getElementById("date-range").textContent = ENGAGEMENT.dateRangeLabel;
    document.getElementById("progress-fill").style.width = progress + "%";

    // Phases
    document.getElementById("phases-grid").innerHTML = PHASES.map(function(p) {
      return '<div class="phase-card ' + (p.status === "active" ? "active" : "") + '">' +
        '<div class="phase-meta">Weeks ' + p.weeks + ' · ' + p.dates + '</div>' +
        '<div class="phase-name">' + p.label + (p.status === "active" ? '<span class="active-dot"></span>' : '') + '</div>' +
        '<div class="phase-desc">' + p.description + '</div></div>';
    }).join("");

    // Milestones
    document.getElementById("milestones-list").innerHTML = MILESTONES.map(function(m) {
      return '<div class="milestone-row"><span class="dot ' + dotClass(m.status) + '"></span>' +
        '<span class="milestone-label ' + m.status + '">' + m.label + '</span>' +
        '<span class="milestone-date">' + m.date + '</span></div>';
    }).join("");

    // Tasks
    var tabsEl = document.getElementById("task-tabs");
    var container = document.getElementById("tasks-container");
    var keys = Object.keys(TASK_GROUPS);

    keys.forEach(function(key, idx) {
      var group = TASK_GROUPS[key];
      var btn = document.createElement("button");
      btn.className = "tab-btn" + (idx === 0 ? " active" : "");
      btn.dataset.tab = key;
      btn.textContent = group.label;
      tabsEl.appendChild(btn);

      var panel = document.createElement("div");
      panel.id = "tasks-" + key;
      panel.style.display = idx === 0 ? "block" : "none";

      if (group.sections) {
        group.sections.forEach(function(section) {
          var html = '<div style="margin-bottom:24px"><div class="phase-group-label">' + section.label + '</div>';
          section.tasks.forEach(function(t) {
            html += '<div class="task-row"><span class="dot ' + dotClass(t.status) + '"></span>' +
              '<span class="task-name ' + (t.status === "In Progress" ? "active" : "") + '">' + t.name + '</span>' +
              '<span class="task-due">' + t.due + '</span></div>';
          });
          html += '</div>';
          panel.innerHTML += html;
        });
      } else {
        group.tasks.forEach(function(t, i) {
          panel.innerHTML += '<div class="task-row"' + (i < group.tasks.length - 1 ? ' style="border-bottom:1px solid #f0f0f0"' : '') + '>' +
            '<span class="dot ' + dotClass(t.status) + '"></span>' +
            '<span class="task-name ' + (t.status === "In Progress" ? "active" : "") + '">' + t.name + '</span>' +
            (t.priority ? '<span class="task-priority ' + t.priority.toLowerCase() + '">' + t.priority + '</span>' : '') +
            '<span class="task-due">' + t.due + '</span></div>';
        });
      }
      container.appendChild(panel);
    });

    tabsEl.querySelectorAll(".tab-btn").forEach(function(btn) {
      btn.addEventListener("click", function() {
        tabsEl.querySelectorAll(".tab-btn").forEach(function(b) { b.classList.remove("active"); });
        btn.classList.add("active");
        keys.forEach(function(k) {
          document.getElementById("tasks-" + k).style.display = k === btn.dataset.tab ? "block" : "none";
        });
      });
    });

    // Needs
    var nHTML = '<div class="needs-header"><span>Item</span><span>When</span><span>Owner</span></div>';
    NEEDS.forEach(function(n) {
      nHTML += '<div class="needs-row"><span>' + n.item + '</span>' +
        '<span class="when ' + (n.urgency === "Now" ? "urgent" : "") + '">' + n.urgency + '</span>' +
        '<span class="owner">' + n.owner + '</span></div>';
    });
    document.getElementById("needs-table").innerHTML = nHTML;
  }

  render();
  </script>
